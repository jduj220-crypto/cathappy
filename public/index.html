<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cathappy - Game Proxy & Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="url"],
        select {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
        }

        .results {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .game-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .game-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .game-item h3 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .game-item p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .game-item .tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            background: #667eea;
            color: white;
            border-radius: 3px;
            font-size: 0.8em;
        }

        .game-item a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .game-item a:hover {
            background: #764ba2;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .proxy-section {
            margin-bottom: 20px;
        }

        .proxy-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #ddd;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .stat {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat h4 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .stat p {
            color: #666;
            font-size: 0.9em;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 0.9em;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2em;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Cathappy</h1>
            <p>Proxy Server & Game Search Engine</p>
        </header>

        <div class="main-content">
            <!-- Search Engine -->
            <div class="card">
                <h2>🔍 Game Search</h2>
                
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search games..."
                    >
                    <button onclick="searchGames()">Search</button>
                </div>

                <div class="filters">
                    <button class="filter-btn" onclick="filterByType('browser')">Browser Games</button>
                    <button class="filter-btn" onclick="filterByType('client')">Client Games</button>
                    <button class="filter-btn" onclick="loadPopular()">Popular</button>
                    <button class="filter-btn" onclick="loadFeatured()">Featured</button>
                </div>

                <div id="results" class="results"></div>
            </div>

            <!-- Proxy Section -->
            <div class="card">
                <h2>🔀 Proxy Tools</h2>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab('browser-proxy')">Browser</button>
                    <button class="tab" onclick="switchTab('content-proxy')">Content</button>
                    <button class="tab" onclick="switchTab('stats')">Stats</button>
                </div>

                <div id="browser-proxy" class="tab-content active">
                    <div class="proxy-section">
                        <h3>Browser Game Proxy</h3>
                        <div class="search-box">
                            <input 
                                type="url" 
                                id="browserUrl" 
                                placeholder="Enter game URL..."
                            >
                            <button onclick="proxyBrowser()">Proxy</button>
                        </div>
                        <div id="browserResult"></div>
                    </div>
                </div>

                <div id="content-proxy" class="tab-content">
                    <div class="proxy-section">
                        <h3>Content Proxy</h3>
                        <div class="search-box">
                            <input 
                                type="url" 
                                id="contentUrl" 
                                placeholder="Enter content URL..."
                            >
                            <button onclick="proxyContent()">Fetch</button>
                        </div>
                        <div id="contentResult"></div>
                    </div>
                </div>

                <div id="stats" class="tab-content">
                    <div class="proxy-section">
                        <h3>Game Statistics</h3>
                        <div id="statsContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = null;

        // Search games
        async function searchGames() {
            const query = document.getElementById('searchInput').value;
            if (!query.trim()) {
                alert('Please enter a search query');
                return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Searching...</div>';

            try {
                const response = await fetch(`/api/search/games?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                displayResults(data.results);
            } catch (err) {
                resultsDiv.innerHTML = '<div class="no-results">Error searching games</div>';
            }
        }

        // Filter by type
        async function filterByType(type) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const response = await fetch(`/api/search/games?type=${type}`);
                const data = await response.json();
                displayResults(data.results);
                currentFilter = type;
            } catch (err) {
                resultsDiv.innerHTML = '<div class="no-results">Error loading games</div>';
            }
        }

        // Load popular games
        async function loadPopular() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Loading popular games...</div>';

            try {
                const response = await fetch('/api/search/popular');
                const data = await response.json();
                displayResults(data.results);
                currentFilter = 'popular';
            } catch (err) {
                resultsDiv.innerHTML = '<div class="no-results">Error loading popular games</div>';
            }
        }

        // Load featured games
        async function loadFeatured() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Loading featured games...</div>';

            try {
                const response = await fetch('/api/search/featured');
                const data = await response.json();
                displayResults(data.results);
                currentFilter = 'featured';
            } catch (err) {
                resultsDiv.innerHTML = '<div class="no-results">Error loading featured games</div>';
            }
        }

        // Display results
        function displayResults(games) {
            const resultsDiv = document.getElementById('results');
            
            if (!games || games.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No games found</div>';
                return;
            }

            let html = '';
            games.forEach(game => {
                html += `
                    <div class="game-item">
                        <h3>${game.name}</h3>
                        <p>${game.description}</p>
                        <div class="tags">
                            <span class="tag">${game.category}</span>
                            <span class="tag">${game.type}</span>
                        </div>
                        <a href="${game.url}" target="_blank">Play Now →</a>
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }

        // Proxy browser game
        async function proxyBrowser() {
            const url = document.getElementById('browserUrl').value;
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            const result = document.getElementById('browserResult');
            result.innerHTML = '<div class="loading">Setting up proxy...</div>';

            try {
                // Open in new window with proxy
                window.open(`/proxy/browser?url=${encodeURIComponent(url)}`);
                result.innerHTML = '<div class="no-results">✓ Proxy link opened in new window</div>';
            } catch (err) {
                result.innerHTML = '<div class="no-results">Error setting up proxy</div>';
            }
        }

        // Proxy content
        async function proxyContent() {
            const url = document.getElementById('contentUrl').value;
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            const result = document.getElementById('contentResult');
            result.innerHTML = '<div class="loading">Fetching content...</div>';

            try {
                const response = await fetch(`/proxy/content?url=${encodeURIComponent(url)}`);
                const data = await response.text();
                result.innerHTML = `<pre>${data.substring(0, 500)}...</pre>`;
            } catch (err) {
                result.innerHTML = '<div class="no-results">Error fetching content</div>';
            }
        }

        // Switch tabs
        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(el => {
                el.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');

            // Load stats if needed
            if (tab === 'stats') {
                loadStats();
            }
        }

        // Load stats
        async function loadStats() {
            try {
                const response = await fetch('/api/search/stats');
                const data = await response.json();

                let html = `<div class="stats">`;
                html += `
                    <div class="stat">
                        <h4>${data.totalGames}</h4>
                        <p>Total Games</p>
                    </div>
                `;

                for (let [cat, count] of Object.entries(data.byCategory)) {
                    html += `
                        <div class="stat">
                            <h4>${count}</h4>
                            <p>${cat}</p>
                        </div>
                    `;
                }

                html += `</div>`;
                document.getElementById('statsContent').innerHTML = html;
            } catch (err) {
                document.getElementById('statsContent').innerHTML = '<div class="no-results">Error loading stats</div>';
            }
        }

        // Load popular on startup
        window.addEventListener('load', loadPopular);
    </script>
</body>
</html>
